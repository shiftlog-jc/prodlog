<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1C1F26">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ProdLog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #1C1F26;
  --surface: #23272f;
  --surface2: #2a2f3a;
  --border: #363c48;
  --accent: #A4D200;
  --warn: #f59e0b;
  --danger: #f87171;
  --text: #f0f2f0;
  --muted: #7a8494;
  --radius: 14px;
  color-scheme: dark;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100%; display: flex; flex-direction: column;
  overscroll-behavior: none;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  padding: max(14px, env(safe-area-inset-top)) 18px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); background: var(--bg);
}
.logo { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.date-badge {
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px; color: var(--muted);
}

/* ── BOTTOM NAV ── */
nav {
  flex-shrink: 0; order: 99;
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
nav button {
  flex: 1; padding: 10px 4px 8px;
  background: none; border: none; border-top: 2px solid transparent;
  color: var(--muted); font-family: 'Syne', sans-serif;
  font-size: 0.65rem; font-weight: 700; cursor: pointer;
  transition: all .18s; display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.nav-icon { font-size: 1.2rem; line-height: 1; }
nav button.active { color: var(--accent); border-top-color: var(--accent); }

/* ── SCROLL AREA ── */
main {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px 14px 24px;
}
.section { display: none; }
.section.active { display: block; }
h2 { font-size: 1rem; font-weight: 800; margin-bottom: 12px; }

/* ── CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
}

/* ── FORM ── */
label {
  display: block; font-size: 0.68rem; font-weight: 700; color: var(--muted);
  margin-bottom: 5px; letter-spacing: .06em; text-transform: uppercase;
}
input[type="text"], input[type="number"], input[type="time"] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 13px 14px; color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 500;
  margin-bottom: 12px; outline: none;
  transition: border-color .2s; -webkit-appearance: none; appearance: none; color-scheme: dark;
}
input[type="number"] { -moz-appearance: textfield; }
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input:focus { border-color: var(--accent); }

/* ── GRID INPUTS ── */
.grid-3 { display: grid; grid-template-columns: 60px 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.grid-3 input, .grid-2 input { margin-bottom: 0; }
.field-lbl { font-size: .62rem; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; display: block; }

/* ── SECTION DIVIDER ── */
.sep-label {
  display: flex; align-items: center; gap: 8px; margin: 8px 0 12px;
}
.sep-label::before, .sep-label::after { content:''; flex:1; height:1px; background: var(--border); }
.sep-label span {
  font-size: .62rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em; white-space: nowrap;
}

/* ── ADD BUTTON ── */
.btn-add {
  width: 100%; padding: 12px; margin-top: 4px;
  border: 1.5px dashed var(--border); border-radius: 10px;
  background: transparent; color: var(--muted);
  font-family: 'Syne', sans-serif; font-size: .82rem; font-weight: 700;
  cursor: pointer; transition: all .18s; letter-spacing: .02em;
}
.btn-add:active { transform: scale(.98); }
.btn-add.ac { border-color: var(--accent); color: var(--accent); }
.btn-add.aw { border-color: var(--warn); color: var(--warn); }

/* ── CHIPS ── */
.chips { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.chip {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  background: var(--surface2); border-radius: 10px; padding: 10px 12px;
  font-family: 'DM Mono', monospace; font-size: .78rem;
}
.chip.cr { border-left: 3px solid var(--accent); }
.chip.cf { border-left: 3px solid var(--warn); }
.chip-text { flex: 1; line-height: 1.4; }
.chip.cr .chip-main { color: var(--accent); font-weight: 500; }
.chip.cf .chip-main { color: var(--warn); font-weight: 500; }
.chip-sub  { font-size: .68rem; color: var(--muted); margin-top: 1px; }
.chip-rm {
  background: none; border: none; color: var(--muted);
  font-size: 1rem; cursor: pointer; padding: 2px 4px; line-height: 1;
  transition: color .15s; flex-shrink: 0; margin-top: -2px;
}
.chip-rm:active { color: var(--danger); }

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 16px; border: none; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all .18s; letter-spacing: .02em;
}
.btn:active { transform: scale(0.97); }
.btn-primary   { background: var(--accent); color: #1C1F26; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-danger    { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; width: auto; font-size: .78rem; border-radius: 8px; }
.btn-xs        { padding: 7px 14px; font-size: .78rem; border-radius: 8px; width: auto; }

/* ── RILEV ITEMS ── */
.rilev-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.rilev-header {
  display: flex; align-items: flex-start;
  justify-content: space-between; margin-bottom: 10px; gap: 8px;
}
.rilev-title  { font-weight: 800; font-size: .95rem; line-height: 1.3; }
.rilev-title span { color: var(--accent); }
.rilev-pezzi  { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); margin-top: 2px; }
.rilev-sec    { margin-top: 8px; }
.rilev-sec-t  { font-size: .6rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
.rilev-line {
  display: flex; align-items: baseline; gap: 6px;
  font-family: 'DM Mono', monospace; font-size: .75rem;
  padding: 3px 0; line-height: 1.4;
}
.dot-r { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 4px; }
.dot-f { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex-shrink: 0; margin-top: 4px; }
.f-desc { color: var(--muted); font-size: .7rem; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: .88rem; }
.empty-icon { font-size: 2.4rem; margin-bottom: 10px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(58px + env(safe-area-inset-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--accent); color: #1C1F26;
  padding: 11px 22px; border-radius: 24px;
  font-weight: 700; font-size: .85rem; z-index: 999;
  transition: transform .3s ease; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Prod<span>Log</span></div>
  <div class="date-badge" id="headerDate"></div>
</header>

<main>

  <!-- ══ TAB: RILEVA ══ -->
  <div id="tab-rileva" class="section active">
    <h2>Nuova rilevazione</h2>
    <div class="card">

      <label>Linea</label>
      <input type="text" id="inLinea" placeholder="es. Linea 1, L3…" autocomplete="off" autocorrect="off" spellcheck="false">

      <label>Codice prodotto</label>
      <input type="text" id="inCodice" placeholder="es. ART-001" autocomplete="off" autocorrect="off" spellcheck="false" style="text-transform:uppercase">

      <label>Pezzi lavorati</label>
      <input type="number" id="inPezzi" placeholder="0" min="0" inputmode="numeric">

      <!-- RISORSE -->
      <div class="sep-label"><span>👷 Risorse</span></div>
      <div id="chipsRisorse" class="chips"></div>
      <div class="grid-3">
        <div>
          <span class="field-lbl">N°</span>
          <input type="number" id="rN" placeholder="—" min="1" max="99" inputmode="numeric">
        </div>
        <div>
          <span class="field-lbl">Dalle ore</span>
          <input type="time" id="rDa">
        </div>
        <div>
          <span class="field-lbl">Alle ore</span>
          <input type="time" id="rA">
        </div>
      </div>
      <button class="btn-add ac" onclick="addRisorsa()">＋ Aggiungi fascia risorse</button>

      <!-- FERMI -->
      <div class="sep-label" style="margin-top:16px"><span>⛔ Fermi</span></div>
      <div id="chipsFermi" class="chips"></div>
      <div class="grid-2">
        <div>
          <span class="field-lbl">Dalle ore</span>
          <input type="time" id="fDa">
        </div>
        <div>
          <span class="field-lbl">Alle ore</span>
          <input type="time" id="fA">
        </div>
      </div>
      <span class="field-lbl">Descrizione fermo</span>
      <input type="text" id="fDesc" placeholder="es. Cambio formato, guasto motore…" autocomplete="off">
      <button class="btn-add aw" onclick="addFermo()" style="margin-top:0">＋ Aggiungi fermo</button>

      <button class="btn btn-primary" onclick="salvaRilevazione()" style="margin-top:18px">✚ Salva rilevazione</button>
    </div>
  </div>

  <!-- ══ TAB: ELENCO ══ -->
  <div id="tab-elenco" class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 style="margin:0">Rilevazioni di oggi</h2>
      <button class="btn btn-danger btn-xs" onclick="svuotaOggi()">🗑 Svuota</button>
    </div>
    <div id="listRilevazioni"></div>
  </div>

  <!-- ══ TAB: EXPORT ══ -->
  <div id="tab-export" class="section">
    <h2>Esporta</h2>
    <div class="card">
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px;line-height:1.55">
        File XLSX con tutte le rilevazioni odierne, pronto da allegare via mail.
      </p>
      <label>Data</label>
      <input type="text" id="exportDateLabel" readonly style="color:var(--accent);font-family:'DM Mono',monospace;cursor:default">
      <button class="btn btn-primary" onclick="exportXLSX()">⬇ Scarica XLSX</button>
    </div>
    <div class="card">
      <div style="font-size:.62rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Anteprima</div>
      <div id="exportPreview"></div>
    </div>
  </div>

</main>

<nav>
  <button class="active" onclick="showTab('rileva',this)">
    <span class="nav-icon">📋</span>Rileva
  </button>
  <button onclick="showTab('elenco',this)">
    <span class="nav-icon">🗂</span>Elenco
  </button>
  <button onclick="showTab('export',this)">
    <span class="nav-icon">⬇</span>Export
  </button>
</nav>

<div id="toast"></div>

<script>
const SK = 'prodlog_v2';
let state = { rilevazioni: [] };
let _tmpRisorse = [];
let _tmpFermi   = [];

function load() {
  try { const s = localStorage.getItem(SK); if (s) state = JSON.parse(s); } catch(e) {}
}
function save() { localStorage.setItem(SK, JSON.stringify(state)); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  document.querySelector('main').scrollTo(0,0);
  if (id==='elenco') renderElenco();
  if (id==='export') renderExport();
}

// ── CHIPS ──
function renderChips() {
  document.getElementById('chipsRisorse').innerHTML = _tmpRisorse.map((r,i) => `
    <div class="chip cr">
      <div class="chip-text">
        <div class="chip-main">${r.n} risorsa${r.n>1?'e':''} · ${r.da}–${r.a}</div>
      </div>
      <button class="chip-rm" onclick="rmRisorsa(${i})">✕</button>
    </div>`).join('');

  document.getElementById('chipsFermi').innerHTML = _tmpFermi.map((f,i) => `
    <div class="chip cf">
      <div class="chip-text">
        <div class="chip-main">⛔ ${f.da}–${f.a}</div>
        ${f.desc ? `<div class="chip-sub">${f.desc}</div>` : ''}
      </div>
      <button class="chip-rm" onclick="rmFermo(${i})">✕</button>
    </div>`).join('');
}

function addRisorsa() {
  const n  = parseInt(document.getElementById('rN').value);
  const da = document.getElementById('rDa').value;
  const a  = document.getElementById('rA').value;
  if (!n||n<1)  { showToast('Inserisci il numero di risorse'); return; }
  if (!da||!a)  { showToast('Inserisci orario dalle/alle'); return; }
  if (da >= a)  { showToast('Ora inizio deve precedere la fine'); return; }
  _tmpRisorse.push({n,da,a});
  document.getElementById('rN').value = '';
  document.getElementById('rDa').value = '';
  document.getElementById('rA').value = '';
  renderChips();
}
function rmRisorsa(i) { _tmpRisorse.splice(i,1); renderChips(); }

function addFermo() {
  const da   = document.getElementById('fDa').value;
  const a    = document.getElementById('fA').value;
  const desc = document.getElementById('fDesc').value.trim();
  if (!da||!a) { showToast('Inserisci orario fermo dalle/alle'); return; }
  if (da >= a) { showToast('Ora inizio deve precedere la fine'); return; }
  _tmpFermi.push({da,a,desc});
  document.getElementById('fDa').value = '';
  document.getElementById('fA').value = '';
  document.getElementById('fDesc').value = '';
  renderChips();
}
function rmFermo(i) { _tmpFermi.splice(i,1); renderChips(); }

// ── SALVA ──
function salvaRilevazione() {
  const linea  = document.getElementById('inLinea').value.trim();
  const codice = document.getElementById('inCodice').value.trim().toUpperCase();
  const pezzi  = parseInt(document.getElementById('inPezzi').value)||0;
  if (!linea)                  { showToast('Inserisci la linea'); return; }
  if (!codice)                 { showToast('Inserisci il codice prodotto'); return; }
  if (_tmpRisorse.length===0)  { showToast('Aggiungi almeno una fascia risorse'); return; }

  state.rilevazioni.push({
    id:uid(), data:today(), linea, codice, pezzi,
    risorse:[..._tmpRisorse], fermi:[..._tmpFermi], ts:Date.now()
  });
  save();
  document.getElementById('inLinea').value  = '';
  document.getElementById('inCodice').value = '';
  document.getElementById('inPezzi').value  = '';
  _tmpRisorse=[]; _tmpFermi=[];
  renderChips();
  document.querySelector('main').scrollTo({top:0,behavior:'smooth'});
  showToast(`✅ Salvato — ${linea} / ${codice}`);
}

// ── ELENCO ──
function renderElenco() {
  const c = document.getElementById('listRilevazioni');
  const rows = state.rilevazioni.filter(r => r.data===today());
  if (!rows.length) {
    c.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Nessuna rilevazione oggi</div>';
    return;
  }
  c.innerHTML = rows.map(r => `
    <div class="rilev-item">
      <div class="rilev-header">
        <div>
          <div class="rilev-title">${r.linea} <span>· ${r.codice}</span></div>
          <div class="rilev-pezzi">Pezzi: ${r.pezzi>0?r.pezzi:'—'}</div>
        </div>
        <button class="btn btn-danger" onclick="eliminaRilevazione('${r.id}')">✕</button>
      </div>
      <div class="rilev-sec">
        <div class="rilev-sec-t">👷 Risorse</div>
        ${r.risorse.map(rs=>`
          <div class="rilev-line">
            <span class="dot-r"></span>
            <span>${rs.n} risorsa${rs.n>1?'e':''} · ${rs.da}–${rs.a}</span>
          </div>`).join('')}
      </div>
      ${r.fermi.length?`
      <div class="rilev-sec">
        <div class="rilev-sec-t">⛔ Fermi</div>
        ${r.fermi.map(f=>`
          <div class="rilev-line">
            <span class="dot-f"></span>
            <span>${f.da}–${f.a}${f.desc?` · <span class="f-desc">${f.desc}</span>`:''}</span>
          </div>`).join('')}
      </div>`:''}
    </div>
  `).join('');
}

function eliminaRilevazione(id) {
  if (!confirm('Eliminare questa rilevazione?')) return;
  state.rilevazioni = state.rilevazioni.filter(r=>r.id!==id);
  save(); renderElenco(); showToast('Eliminata');
}
function svuotaOggi() {
  const n = state.rilevazioni.filter(r=>r.data===today()).length;
  if (!n) { showToast('Nessuna rilevazione oggi'); return; }
  if (!confirm(`Eliminare tutte le ${n} rilevazioni di oggi?`)) return;
  state.rilevazioni = state.rilevazioni.filter(r=>r.data!==today());
  save(); renderElenco(); showToast('Rilevazioni eliminate');
}

// ── EXPORT ──
function renderExport() {
  document.getElementById('exportDateLabel').value = fmtDate(today());
  const rows = state.rilevazioni.filter(r=>r.data===today());
  const prev = document.getElementById('exportPreview');
  if (!rows.length) {
    prev.innerHTML='<div class="empty" style="padding:16px"><div class="empty-icon">📊</div>Nessuna rilevazione oggi</div>';
    return;
  }
  prev.innerHTML = rows.map(r=>`
    <div style="display:flex;align-items:baseline;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem">
      <span style="font-weight:800;color:var(--accent)">${r.linea}</span>
      <span style="color:var(--muted)">/</span>
      <span style="font-weight:700">${r.codice}</span>
      <span style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);margin-left:auto">${r.pezzi>0?r.pezzi+' pz':''}</span>
    </div>`).join('');
}

function exportXLSX() {
  const rows = state.rilevazioni.filter(r=>r.data===today());
  if (!rows.length) { showToast('Nessuna rilevazione da esportare'); return; }

  const wb = XLSX.utils.book_new();
  const data = [['DATA','LINEA','CODICE PRODOTTO','PEZZI LAVORATI',
                 'N° RISORSE','RISORSE DALLE','RISORSE ALLE',
                 'FERMO DALLE','FERMO ALLE','DESCRIZIONE FERMO']];

  rows.forEach(r => {
    const maxLen = Math.max(r.risorse.length, r.fermi.length, 1);
    for (let i=0; i<maxLen; i++) {
      const ris = r.risorse[i];
      const fer = r.fermi[i];
      data.push([
        i===0?r.data:'', i===0?r.linea:'', i===0?r.codice:'',
        i===0?(r.pezzi>0?r.pezzi:''):'',
        ris?ris.n:'', ris?ris.da:'', ris?ris.a:'',
        fer?fer.da:'', fer?fer.a:'', fer?(fer.desc||''):''
      ]);
    }
    data.push(new Array(10).fill(''));
  });

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:12},{wch:14},{wch:18},{wch:16},{wch:12},{wch:13},{wch:13},{wch:13},{wch:13},{wch:26}];
  XLSX.utils.book_append_sheet(wb, ws, 'Rilevazioni');
  const filename = `ProdLog_${today()}.xlsx`;
  XLSX.writeFile(wb, filename);
  showToast(`✅ Scaricato ${filename}`);
}

// ── INIT ──
document.getElementById('headerDate').textContent =
  new Date().toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});
load();
renderChips();
</script>
</body>
</html>
